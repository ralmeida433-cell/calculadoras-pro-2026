<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2B7A5E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1B4D6A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B4D6A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2A6F96;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Hex background -->
  <polygon points="100,8 185,55 185,145 100,192 15,145 15,55" fill="url(#hexGrad)" opacity="0.15"/>
  <polygon points="100,20 175,62 175,138 100,180 25,138 25,62" fill="none" stroke="url(#hexGrad)" stroke-width="3"/>
  <!-- Chart line -->
  <polyline points="40,130 70,110 95,125 120,85 150,70" fill="none" stroke="#2B7A5E" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dollar sign -->
  <text x="90" y="75" font-family="Arial" font-weight="900" font-size="38" fill="#2D3748" opacity="0.85">$</text>
  <!-- Arrow up-right -->
  <line x1="130" y1="80" x2="158" y2="52" stroke="url(#arrowGrad)" stroke-width="5" stroke-linecap="round"/>
  <polygon points="158,52 148,50 156,42" fill="#1B4D6A"/>
  <!-- Red dot -->
  <circle cx="120" cy="85" r="5" fill="#E74C3C"/>
</svg>
